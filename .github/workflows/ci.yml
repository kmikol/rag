name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint
        run: make lint

      - name: Typecheck
        run: make typecheck

      - name: Unit tests
        run: make test.unit

      - name: Integration tests
        run: make test.integration

      - name: Smoke tests
        run: make test.smoke

  e2e:
    runs-on: ubuntu-latest
    needs: test
    env:
      GEMINI_API_KEY_E2E_TEST: ${{ secrets.GEMINI_API_KEY_E2E_TEST }}
    steps:
      - uses: actions/checkout@v4

      - name: End-to-end RAG test
        run: make test.e2e
