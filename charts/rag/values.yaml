nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

rbac:
  create: false
  rules: []

embedding:
  backend: fake
  modelName: fake-model
  dimension: 8
  endpointUrl: http://localhost:11434
  timeoutSeconds: 30
  keepAlive: 5m
  apiKey:
    existingSecret: ""
    secretKey: EMBEDDING_API_KEY

llm:
  provider: openai_compatible
  chatCompletionsUrl: http://localhost:11434/v1/chat/completions
  endpointUrl: https://generativelanguage.googleapis.com/v1beta
  model: gemma3:4b
  timeoutSeconds: 120
  temperature: ""
  maxTokens: ""
  apiKey:
    existingSecret: ""
    secretKey: LLM_API_KEY

sharedStorage:
  enabled: false
  create: false
  existingClaim: ""
  name: ""
  size: 100Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  mountPath: /data

apiService:
  useEmbeddingConfig: true
  useLlmConfig: true
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-api-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  apiKey:
    existingSecret: ""
    secretKey: RAG_API_KEY
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  resources: {}
  env: {}
  envFrom: []
  extraEnv: []
  persistence:
    enabled: false
    existingClaim: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /app/data

ingestionWorker:
  useEmbeddingConfig: true
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-ingestion-worker
    tag: ""
    pullPolicy: IfNotPresent
  containerPort: 8000
  command: []
  args: []
  resources: {}
  env: {}
  envFrom: []
  extraEnv: []
  cronJob:
    enabled: false
    schedule: "0 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    backoffLimit: 1
    restartPolicy: Never
    command:
      - python
      - -m
      - ingestion_worker.worker
    args:
      - --fail-on-error
  persistence:
    enabled: false
    existingClaim: ""
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /app/data

embeddingService:
  useEmbeddingConfig: true
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-embedding-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  resources: {}
  env: {}
  envFrom: []
  extraEnv: []
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20

qdrant:
  replicas: 1
  image:
    repository: qdrant/qdrant
    tag: v1.13.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6333
  containerPort: 6333
  resources: {}
  env: {}
  persistence:
    enabled: false
    existingClaim: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /qdrant/storage

database:
  existingSecret: rag-db-credentials
  host: postgresql
  port: 5432
  name: rag
  userSecretKey: DB_USER
  passwordSecretKey: DB_PASSWORD

postgresql:
  enabled: false
  image:
    repository: postgres
    tag: "16"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
  containerPort: 5432
  env:
    PGDATA: /var/lib/postgresql/data/pgdata
  resources: {}
  readinessProbe:
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    initialDelaySeconds: 30
    periodSeconds: 20
  persistence:
    enabled: false
    existingClaim: ""
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /var/lib/postgresql/data
