nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

rbac:
  create: false

existingSecret: rag-db-credentials

apiService:
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-api-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  resources: {}
  env: {}
  persistence:
    enabled: false
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /app/data

ingestionWorker:
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-ingestion-worker
    tag: ""
    pullPolicy: IfNotPresent
  containerPort: 8000
  resources: {}
  env: {}
  persistence:
    enabled: false
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /app/data

embeddingService:
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-embedding-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  resources: {}
  env: {}

qdrant:
  replicas: 1
  image:
    repository: qdrant/qdrant
    tag: v1.13.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6333
  containerPort: 6333
  resources: {}
  env: {}
  persistence:
    enabled: false
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /qdrant/storage

database:
  host: postgresql
  port: 5432
  name: rag
  userSecretKey: DB_USER
  passwordSecretKey: DB_PASSWORD
