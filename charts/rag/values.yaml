nameOverride: ""
fullnameOverride: ""

imagePullSecrets: []

serviceAccount:
  create: true
  name: ""

rbac:
  create: false
  rules: []

existingSecret: rag-db-credentials

sharedStorage:
  enabled: false
  create: false
  existingClaim: ""
  name: ""
  size: 100Gi
  accessModes:
    - ReadWriteMany
  storageClassName: ""
  mountPath: /data

apiService:
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-api-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  ingress:
    enabled: false
    className: ""
    annotations: {}
    hosts: []
    tls: []
  apiKey:
    existingSecret: ""
    secretKey: RAG_API_KEY
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20
  resources: {}
  env: {}
  envFrom: []
  extraEnv: []
  persistence:
    enabled: false
    existingClaim: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /app/data

ingestionWorker:
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-ingestion-worker
    tag: ""
    pullPolicy: IfNotPresent
  containerPort: 8000
  command: []
  args: []
  resources: {}
  env: {}
  envFrom: []
  extraEnv: []
  cronJob:
    enabled: false
    schedule: "0 * * * *"
    successfulJobsHistoryLimit: 3
    failedJobsHistoryLimit: 3
    backoffLimit: 1
    restartPolicy: Never
    command:
      - python
      - -m
      - ingestion_worker.worker
    args:
      - --fail-on-error
  persistence:
    enabled: false
    existingClaim: ""
    size: 20Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /app/data

embeddingService:
  replicas: 1
  image:
    repository: ghcr.io/kmikol/rag-embedding-service
    tag: ""
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 8000
  containerPort: 8000
  resources: {}
  env: {}
  envFrom: []
  extraEnv: []
  readinessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 5
    periodSeconds: 10
  livenessProbe:
    enabled: true
    path: /health
    initialDelaySeconds: 15
    periodSeconds: 20

qdrant:
  replicas: 1
  image:
    repository: qdrant/qdrant
    tag: v1.13.2
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 6333
  containerPort: 6333
  resources: {}
  env: {}
  persistence:
    enabled: false
    existingClaim: ""
    size: 10Gi
    accessModes:
      - ReadWriteOnce
    storageClassName: ""
    mountPath: /qdrant/storage

database:
  host: postgresql
  port: 5432
  name: rag
  userSecretKey: DB_USER
  passwordSecretKey: DB_PASSWORD
