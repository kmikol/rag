sharedStorage:
  enabled: true
  create: true
  size: 100Gi
  accessModes:
    - ReadWriteMany
  storageClassName: longhorn-r2
  mountPath: /data

database:
  existingSecret: rag-db-credentials
  port: 5432
  name: rag

postgresql:
  enabled: true
  persistence:
    enabled: true
    storageClassName: longhorn-r2
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

embedding:
  backend: google
  modelName: gemini-embedding-2
  dimension: 768
  endpointUrl: https://generativelanguage.googleapis.com/v1beta
  timeoutSeconds: 60
  keepAlive: 5m
  apiKey:
    existingSecret: rag-embedding-credentials
    secretKey: EMBEDDING_API_KEY

llm:
  provider: google_genai
  endpointUrl: https://generativelanguage.googleapis.com/v1beta
  model: gemini-3.1-flash-lite
  timeoutSeconds: 180
  apiKey:
    existingSecret: rag-llm-credentials
    secretKey: LLM_API_KEY

apiService:
  useEmbeddingConfig: true
  useLlmConfig: true
  apiKey:
    existingSecret: rag-api-credentials
    secretKey: RAG_API_KEY
  env:
    QDRANT_COLLECTION: rag_chunks
    WATCH_ROOTS: /data/watch
    DOCUMENT_STORE_PATH: /data/documents
    CHAT_MIN_TOP_SCORE: "0.5"
    CHAT_MIN_USABLE_CHUNKS: "1"
    CHAT_MAX_CONTEXT_CHUNKS: "5"
    CHAT_MAX_CHUNK_CHARS: "2000"
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: cluster.home.arpa
        paths:
          - path: /rag
            pathType: Prefix
      - host: cluster.example.ts.net
        paths:
          - path: /rag
            pathType: Prefix
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

ingestionWorker:
  useEmbeddingConfig: true
  env:
    QDRANT_COLLECTION: rag_chunks
    WATCH_ROOTS: /data/watch
    DOCUMENT_STORE_PATH: /data/documents
  cronJob:
    enabled: true
    schedule: "0 * * * *"
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

embeddingService:
  useEmbeddingConfig: true
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi

qdrant:
  persistence:
    enabled: true
    storageClassName: longhorn-r2
    size: 20Gi
  resources:
    requests:
      cpu: 100m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 2Gi
