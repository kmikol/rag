existingSecret: rag-db-credentials

database:
  host: postgresql.database.svc.cluster.local
  port: 5432
  name: rag

apiService:
  apiKey:
    existingSecret: rag-api-credentials
    secretKey: RAG_API_KEY
  ingress:
    enabled: true
    className: traefik
    hosts:
      - host: cluster.home.arpa
        paths:
          - path: /rag
            pathType: Prefix
      - host: cluster.example.ts.net
        paths:
          - path: /rag
            pathType: Prefix

ingestionWorker:
  cronJob:
    enabled: true
    schedule: "0 * * * *"
  persistence:
    enabled: true
    storageClassName: longhorn

qdrant:
  persistence:
    enabled: true
    storageClassName: longhorn
