database:
  existingSecret: rag-db-credentials
  host: postgresql.database.svc.cluster.local
  port: 5432
  name: rag

postgresql:
  enabled: false

embedding:
  backend: ollama
  modelName: embeddinggemma
  dimension: 768
  endpointUrl: http://ollama.default.svc.cluster.local:11434

apiService:
  useEmbeddingConfig: true
  useLlmConfig: true
  apiKey:
    existingSecret: rag-api-credentials
    secretKey: RAG_API_KEY
  ingress:
    enabled: true
    hosts:
      - host: rag.local
        paths:
          - path: /rag
            pathType: Prefix

ingestionWorker:
  useEmbeddingConfig: true
  env:
    WATCH_ROOTS: /data/watch
  cronJob:
    enabled: true
    schedule: "0 * * * *"

embeddingService:
  useEmbeddingConfig: true
  resources: {}

qdrant:
  persistence:
    enabled: true
    storageClassName: standard
