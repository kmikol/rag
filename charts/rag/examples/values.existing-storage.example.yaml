database:
  existingSecret: rag-db-credentials
  host: postgresql.database.svc.cluster.local
  port: 5432
  name: rag

postgresql:
  enabled: false

embedding:
  backend: ollama
  modelName: embeddinggemma
  dimension: 768
  endpointUrl: http://ollama.default.svc.cluster.local:11434

llm:
  provider: openai_compatible
  chatCompletionsUrl: http://ollama.default.svc.cluster.local:11434/v1/chat/completions
  model: gemma3:4b

sharedStorage:
  enabled: true
  create: false
  existingClaim: rag-corpus
  mountPath: /data

apiService:
  useEmbeddingConfig: true
  useLlmConfig: true
  apiKey:
    existingSecret: rag-api-credentials
    secretKey: RAG_API_KEY
  env:
    WATCH_ROOTS: /data/watch
    DOCUMENT_STORE_PATH: /data/documents

ingestionWorker:
  useEmbeddingConfig: true
  env:
    WATCH_ROOTS: /data/watch
    DOCUMENT_STORE_PATH: /data/documents
  persistence:
    enabled: true
    existingClaim: rag-worker-cache

embeddingService:
  useEmbeddingConfig: true
  resources: {}

qdrant:
  persistence:
    enabled: true
    existingClaim: rag-qdrant
