{{- include "rag.validate" . -}}
{{- if and .Values.sharedStorage.enabled .Values.sharedStorage.create (not .Values.sharedStorage.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rag.sharedStorageClaimName" . }}
spec:
  accessModes:
    {{- toYaml .Values.sharedStorage.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.sharedStorage.size }}
  {{- with .Values.sharedStorage.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
{{- if and .Values.apiService.persistence.enabled (not .Values.apiService.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rag.fullname" . }}-api-data
spec:
  accessModes:
    {{- toYaml .Values.apiService.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.apiService.persistence.size }}
  {{- with .Values.apiService.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
{{- if and .Values.ingestionWorker.persistence.enabled (not .Values.ingestionWorker.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rag.fullname" . }}-ingestion-worker-data
spec:
  accessModes:
    {{- toYaml .Values.ingestionWorker.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.ingestionWorker.persistence.size }}
  {{- with .Values.ingestionWorker.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
---
{{- end }}
{{- if and .Values.qdrant.persistence.enabled (not .Values.qdrant.persistence.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "rag.fullname" . }}-qdrant-data
spec:
  accessModes:
    {{- toYaml .Values.qdrant.persistence.accessModes | nindent 4 }}
  resources:
    requests:
      storage: {{ .Values.qdrant.persistence.size }}
  {{- with .Values.qdrant.persistence.storageClassName }}
  storageClassName: {{ . }}
  {{- end }}
{{- end }}
